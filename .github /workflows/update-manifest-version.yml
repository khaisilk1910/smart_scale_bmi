name: Update Manifest Version on Release

on:
  release:
    types: [published]

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền cho Action được phép commit và push tag

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0 # Quan trọng: Lấy toàn bộ lịch sử để có quyền ghi đè Tag

      - name: Lấy phiên bản từ Release Tag
        id: get_version
        run: |
          # Lấy tên tag của release vừa tạo
          VERSION="${{ github.event.release.tag_name }}"
          # Xóa chữ 'v' ở đầu
          VERSION=${VERSION#v}
          echo "Bản phát hành mới là: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Cập nhật file manifest.json
        run: |
          # Cập nhật đường dẫn tới file manifest.json
          MANIFEST_PATH="custom_components/smart_scale_bmi/manifest.json"
          
          # Dùng công cụ jq để sửa file JSON một cách an toàn
          jq '.version = env.VERSION' $MANIFEST_PATH > tmp.json && mv tmp.json $MANIFEST_PATH

      - name: Commit và Push thay đổi
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: tự động cập nhật version thành ${{ env.VERSION }}"
          file_pattern: '**/manifest.json'

      - name: Ép Tag trỏ vào commit mới (Để HACS tải đúng code)
        if: steps.auto-commit.outputs.changes_detected == 'true'
        run: |
          # Xóa tag cũ ở local và tạo lại tag trỏ vào commit mới nhất vừa sửa manifest
          git tag -f ${{ github.event.release.tag_name }}
          
          # Đẩy tag mới này lên GitHub (ghi đè tag cũ)
          git push -f origin ${{ github.event.release.tag_name }}
